{% extends "layout.html" %}

{% block title%}
    buy
{% endblock %}

{% block main %}
    <form action="/buy" method="post">
        <div class="mb-3">
            <input class="form-control mx-auto w-auto" autofocus autocomplete="off" name="symbol" placeholder="Symbol" type="text">
        </div>

        <div class="mb-3">
            <input class="form-control mx-auto w-auto"  autocomplete="off" name="shares" placeholder="Shares" type="number" min="1">
        </div>

        <button class="btn btn-primary" type="submit">Buy</button>
    </form>
{% endblock %}
